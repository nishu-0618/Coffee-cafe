<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Menu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="menu">
        <header>
            <h1>CAMPER CAFE</h1>
            <p class="est">Est. 2020</p>
        </header>
        <hr>
        <main>
            <section>
                <h2>Coffee</h2>
                <article class="item">
                    <p class="flavor">French Vanilla</p> <p class="price">3.00</p>
                </article>
                <article class="item">
                    <p class="flavor">Cappuchino</p> <p class="price">3.75</p>
                </article>
                <article class="item">
                    <p class="flavor">Fries</p> <p class="price">1.75</p>
                </article>
                <article class="item">
                    <p class="flavor">Burger</p> <p class="price">2.90</p>
                </article>
            </section>
            <section>
                <h2>Desserts</h2>
                <article class = 'item'>
                    <p class="dessert">Donut</p> <p class="price">1.50</p>
                </article>
                <article class = 'item'>
                    <p class="dessert">Cherry pie</p> <p class="price">2.75</p>
                </article>
                <article class = 'item'>
                    <p class="dessert">Cheesecake</p> <p class="price">3.00</p>
                </article>
                <article class = 'item'>
                    <p class="dessert">Cinnamon role</p> <p class="price">2.50</p>
                </article>
            </section>
        </main>
        <hr class="bottom-line">
        <footer>
            <p>
                <a href="https://www.freecodecamp.org">Visit our website</a>
            </p>
            <p>123 freecodecamp Drive</p>
        </footer>
    </div>
</body>
</html>
