<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Menu</title>
    <link rel="stylesheet" href="stylesv2.css">
    <script src="script.js"></script>
</head>
<body>
    <body>

        <!-- NAVBAR -->
        <nav class="navbar">
            <h1>CAMPER CAFE</h1>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    
        <!-- HERO SECTION -->
        <section class="hero">
            <h2>Fresh Coffee, Cozy Vibes ☕</h2>
            <p>Start your day with the perfect brew</p>
            <button>View Menu</button>
        </section>
    
        <!-- MENU -->
        <div class="menu" id="menu">
            <header>
                <h2>Our Menu</h2>
            </header>
    
            <section>
                <h3>Coffee</h3>
    
                <div class="card">
                    <span>French Vanilla</span>
                    <span>$3.00</span>
                </div>
    
                <div class="card">
                    <span>Cappuccino</span>
                    <span>$3.75</span>
                </div>
    
                <div class="card">
                    <span>Latte</span>
                    <span>$4.00</span>
                </div>
            </section>
    
            <section>
                <h3>Desserts</h3>
    
                <div class="card">
                    <span>Donut</span>
                    <span>$1.50</span>
                </div>
    
                <div class="card">
                    <span>Cheesecake</span>
                    <span>$3.00</span>
                </div>
            </section>
        </div>
    
        <!-- FOOTER -->
        <footer id="contact">
            <p>📍 123 Coffee Street</p>
            <p>© 2026 Camper Cafe</p>
        </footer>
    
    </body>
</body>
</html>
